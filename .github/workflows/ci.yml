name: CI

on:
  push:
    branches: [ "m-develop", "main" ]
  pull_request:
    branches: [ "m-develop", "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # ex: owner/repo

jobs:
  build_dev:
    name: Build (dev / validation)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/m-develop' || (github.event_name == 'pull_request' && github.base_ref == 'm-develop')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Optionnel: build simple sans push
      - name: Build dev image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: dev
          push: false
          tags: local/dev:${{ github.sha }}

      # Ici tu peux ajouter des tests (phpunit, pint, etc.)
      # Exemple simple (si tu veux) :
      # - name: Run tests
      #   run: |
      #     docker run --rm local/dev:${{ github.sha }} php -v


  deploy_prod:
    name: Build & Deploy (prod)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    # ⚠️ IMPORTANT: on déploie seulement sur push main, pas sur PR
    # Donc on va garder le job, mais conditionner la partie deploy.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build & Push prod image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ---- DEPLOY VPS : uniquement sur push main ----
      - name: Deploy to VPS (SSH)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            # Login GHCR côté VPS (utilise un PAT "read:packages")
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker pull "$IMAGE"

            # Exemple: redémarrer un conteneur "backend" sur le réseau traefik
            docker stop backend || true
            docker rm backend || true

            docker run -d \
              --name backend \
              --network traefik \
              -e APP_ENV=production \
              -e APP_DEBUG=false \
              -e APP_KEY='${{ secrets.APP_KEY }}' \
              -e DB_CONNECTION=pgsql \
              -e DB_HOST='${{ secrets.DB_HOST }}' \
              -e DB_PORT='${{ secrets.DB_PORT }}' \
              -e DB_DATABASE='${{ secrets.DB_DATABASE }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.backend.rule=Host(`${{ secrets.PROD_DOMAIN }}`)" \
              -l "traefik.http.routers.backend.entrypoints=websecure" \
              -l "traefik.http.routers.backend.tls.certresolver=letsencrypt" \
              "$IMAGE"
