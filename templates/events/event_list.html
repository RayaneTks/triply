{% extends "base.html" %}
{% block title %}Événements{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-3xl font-semibold">Événements</h1>
  <a class="bg-indigo-600 text-white px-4 py-2 rounded" href="{% url 'event_create' %}">Créer</a>
</div>
<div class="grid md:grid-cols-2 gap-6">
  {% for event in events %}
    <div class="bg-white shadow rounded p-4">
      <h2 class="text-xl font-semibold">{{ event.title }}</h2>
      <p class="text-slate-500">{{ event.start_at|date:"d/m/Y H:i" }}</p>
      <p class="text-slate-500">{{ event.address }}</p>
      <div class="mt-4 flex gap-2">
        <a class="text-indigo-600" href="{% url 'event_detail' event.id %}">Détails</a>
        <a class="text-indigo-600" href="{% url 'guest_list' event.id %}">Invités</a>
      </div>
    </div>
  {% empty %}
    <div class="bg-white shadow rounded p-4">Aucun événement.</div>
  {% endfor %}
</div>
{% endblock %}
