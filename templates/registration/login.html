{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded p-6">
  <h1 class="text-2xl font-semibold mb-4">Connexion</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="w-full bg-indigo-600 text-white py-2 rounded">Se connecter</button>
  </form>
</div>
{% endblock %}
