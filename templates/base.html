<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Triply{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <nav class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="{% url 'dashboard' %}" class="text-xl font-semibold">Triply</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="{% url 'event_list' %}" class="hover:text-indigo-600">Événements</a>
        <a href="{% url 'template_list' %}" class="hover:text-indigo-600">Templates</a>
        {% if request.user.is_authenticated %}
          <span class="text-slate-500">{{ request.user.email|default:request.user.username }}</span>
          <a href="{% url 'logout' %}" class="text-indigo-600">Déconnexion</a>
        {% else %}
          <a href="{% url 'login' %}" class="text-indigo-600">Connexion</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% for message in messages %}
      <div class="mb-4 rounded bg-emerald-100 text-emerald-800 px-4 py-2">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
