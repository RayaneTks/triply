services:
  # ========================================
  # Development Frontend Service
  # ========================================
  tri-app:
    build:
      context: ./frontend/triplydev
      dockerfile: ./docker/development/Dockerfile
      target: development
    container_name: tri-app
    ports:
      - "5173:3000"
    env_file:
      - ./frontend/triplydev/.env
    environment:
      NODE_ENV: development
    # Image : utilisateur non-root (nodejs). Éviter user root en dev sauf besoin ponctuel de permissions sur le bind-mount.
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    networks:
      - triply-development
    volumes:
      - ./frontend/triplydev:/app
      - tri-frontend_node_modules:/app/node_modules
      - tri-frontend_next:/app/.next
    restart: unless-stopped


  # ========================================
  # Development Backend Service
  # ========================================
  # Backend - Nginx ========================
  tri-api:
    container_name: tri-api
    image: nginx:1.27-alpine
    volumes:
      # Mount the application code for live updates
      - ./backend:/var/www

      # Mount the Nginx configuration file
      - ./backend/docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      # Map port 80 inside the container to the port specified by 'NGINX_PORT' on the host machine
      - "8000:80"
    environment:
      - NGINX_HOST=localhost
    networks:
      - triply-development
    depends_on:
      tri-php-fpm:
        condition: service_started # Wait for php-fpm to start

  # Backend - PHP-FPM ======================
  tri-php-fpm:
    # For the php-fpm service, we will use our common PHP-FPM Dockerfile with the development target
    build:
      context: ./backend
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-true}
        XDEBUG_MODE: develop,coverage,debug,profile
        XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
        XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
        XDEBUG_LOG: /dev/stdout
        XDEBUG_LOG_LEVEL: 0
    env_file:
      # Load the environment variables from the Laravel application
      - ./backend/.env
    ## user: "${UID:-1000}:${GID:-1000}"
    environment:
      UID: "${UID:-1000}"
      GID: "${GID:-1000}"
    volumes:
      # Mount the application code for live updates
      - ./backend:/var/www
      - type: volume
        source: tri-backend-vendor
        target: /var/www/vendor
        volume:
          nocopy: true
    networks:
      - triply-development
    depends_on:
      tri-postgres:
        condition: service_healthy # Wait for postgres to be healthy

  # Backend - Workspace ====================
  tri-workspace:
    # For the workspace service, we will also create a custom image to install and setup all the necessary stuff.
    build:
      context: ./backend
      dockerfile: ./docker/development/workspace/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-true}
        XDEBUG_MODE: develop,coverage,debug,profile
        XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
        XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
        XDEBUG_LOG: /dev/stdout
        XDEBUG_LOG_LEVEL: 0
    tty: true # Enables an interactive terminal
    stdin_open: true # Keeps standard input open for 'docker exec'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www
      - type: volume
        source: tri-backend-vendor
        target: /var/www/vendor
        volume:
          nocopy: true
    networks:
      - triply-development

  # Backend - Database =====================
  tri-postgres:
    image: postgres:16
    restart: unless-stopped
    user: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - tri-postgres-data:/var/lib/postgresql/data
    networks:
      - triply-development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  tri-pgadmin:
    image: dpage/pgadmin4
    ports:
      - "8080:80"
    environment:
      PMA_HOST: tri-postgres
      POSTGRES_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE}
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - triply-development
    depends_on:
      tri-postgres:
        condition: service_healthy # Wait for postgres to be healthy

  # Backend - Cache ========================
  tri-redis:
    image: redis:7-alpine
    networks:
      - triply-development
    depends_on:
      tri-postgres:
        condition: service_healthy


networks:
  # Attach the service to the 'laravel' network.
  # -----------------------------------------------------------
  # This custom network allows all services within it to communicate using their service names as hostnames.
  # For example, 'php-fpm' can connect to 'pgsql' by using 'tri-postgres' as the hostname.
  # -----------------------------------------------------------
  triply-development:

volumes:
  tri-postgres-data:
  tri-frontend_node_modules:
  tri-frontend_next:
  tri-backend-vendor: