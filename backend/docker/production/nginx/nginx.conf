events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Résoudre tri-php-fpm à l'exécution (Docker recycle les IP après recreate).
    # Sans cela, Nginx peut garder une IP obsolète → 502 "Connection refused" vers fastcgi.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        root /var/www/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            set $phpfpm_upstream tri-php-fpm:9000;
            fastcgi_pass $phpfpm_upstream;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}